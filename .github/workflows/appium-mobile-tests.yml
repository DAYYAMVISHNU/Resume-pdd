name: "📱 Appium Mobile Tests"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for manual trigger"
        required: false
        default: "Manual run"

permissions:
  contents: read

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  appium-mobile-tests:
    name: "Mobile App Test Suite (Android)"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────
      - name: "📥 Checkout repository"
        uses: actions/checkout@v4

      # ── 2. Python setup ───────────────────────────────────────────────────
      - name: "🐍 Set up Python 3.11"
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # ── 3. Install test dependencies ──────────────────────────────────────
      - name: "📦 Install test dependencies"
        run: |
          python -m pip install --upgrade pip
          pip install openpyxl

      # ── 4. Run simulation suite ───────────────────────────────────────────
      - name: "🤖 Run Appium mobile test suite"
        id: appium-run
        run: python automated_test/ci_appium_simulator.py

      # ── 5. Parse results for outputs ──────────────────────────────────────
      - name: "📊 Parse test results"
        id: parse-results
        if: always()
        run: |
          python - <<'PYEOF'
          import json, os, sys

          results_file = "automated_test/appium_ci_results.json"
          if not os.path.exists(results_file):
              print("Results file not found — skipping parse step")
              sys.exit(0)

          with open(results_file) as f:
              data = json.load(f)

          summary = data.get("summary", {})
          total   = summary.get("total", 0)
          passed  = summary.get("passed", 0)
          failed  = summary.get("failed", 0)
          rate    = summary.get("pass_rate_pct", 0)

          print(f"Total:  {total}")
          print(f"Passed: {passed}")
          print(f"Failed: {failed}")
          print(f"Rate:   {rate}%")

          # Write to $GITHUB_OUTPUT
          output_file = os.environ.get("GITHUB_OUTPUT", "")
          if output_file:
              with open(output_file, "a") as out:
                  out.write(f"total={total}\n")
                  out.write(f"passed={passed}\n")
                  out.write(f"failed={failed}\n")
                  out.write(f"pass_rate={rate}\n")
          PYEOF

      # ── 6. Upload artifacts ───────────────────────────────────────────────
      - name: "📤 Upload test results (JSON + Markdown)"
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: "appium-mobile-results-run${{ github.run_number }}"
          path: |
            automated_test/appium_ci_results.json
            automated_test/appium_ci_report.md
          retention-days: 30
          if-no-files-found: warn

      # ── 7. Post markdown summary to Actions UI ────────────────────────────
      - name: "📝 Write job summary"
        if: always()
        run: |
          REPORT="automated_test/appium_ci_report.md"
          if [ -f "$REPORT" ]; then
            cat "$REPORT" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## ⚠️ Appium Report Not Generated" >> "$GITHUB_STEP_SUMMARY"
            echo "The simulation script did not produce a markdown report." >> "$GITHUB_STEP_SUMMARY"
          fi

      # ── 8. Final status annotation ────────────────────────────────────────
      - name: "✅ Test suite status"
        if: always()
        run: |
          FAILED="${{ steps.parse-results.outputs.failed }}"
          TOTAL="${{ steps.parse-results.outputs.total }}"
          PASSED="${{ steps.parse-results.outputs.passed }}"
          RATE="${{ steps.parse-results.outputs.pass_rate }}"

          echo "──────────────────────────────────────"
          echo "  APPIUM MOBILE TESTS — FINAL SUMMARY"
          echo "──────────────────────────────────────"
          echo "  Total Tests : ${TOTAL:-N/A}"
          echo "  Passed      : ${PASSED:-N/A}"
          echo "  Failed      : ${FAILED:-N/A}"
          echo "  Pass Rate   : ${RATE:-N/A}%"
          echo "──────────────────────────────────────"

          if [ "${FAILED:-0}" -gt 0 ]; then
            echo "❌ ${FAILED} test(s) failed."
            exit 1
          else
            echo "✅ All tests passed."
          fi
