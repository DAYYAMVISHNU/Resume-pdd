name: Selenium E2E and CI/CD Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  selenium-e2e-test:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ── 2. Install Chrome ─────────────────────────────────────────────────────
      - name: Install Google Chrome
        run: |
          sudo apt-get update -q
          sudo apt-get install -y google-chrome-stable
          google-chrome --version

      # ── 3. Install ChromeDriver ───────────────────────────────────────────────
      - name: Install ChromeDriver
        run: |
          CHROME_VER=$(google-chrome --version | grep -oP '\d+\.\d+\.\d+\.\d+')
          DRIVER_VER=$(curl -s "https://googlechromelabs.github.io/chrome-for-testing/LATEST_RELEASE_${CHROME_VER%%.*}")
          curl -sSL "https://storage.googleapis.com/chrome-for-testing-public/${DRIVER_VER}/linux64/chromedriver-linux64.zip" -o chromedriver.zip
          unzip -q chromedriver.zip
          sudo mv chromedriver-linux64/chromedriver /usr/local/bin/chromedriver
          sudo chmod +x /usr/local/bin/chromedriver
          chromedriver --version

      # ── 4. Setup Python ───────────────────────────────────────────────────────
      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # ── 5. Install Python dependencies ────────────────────────────────────────
      - name: Install Python & Selenium Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install selenium==4.18.1 Pillow openpyxl
          # Install backend requirements (non-blocking if some fail)
          pip install flask flask-cors PyPDF2 python-docx gunicorn || true

      # ── 6. Write Selenium test that targets the LIVE GitHub Pages site ────────
      - name: Write Selenium Test Script
        run: |
          cat > run_selenium_tests.py << 'PYTHON_EOF'
          import json, time, sys
          from datetime import datetime
          from selenium import webdriver
          from selenium.webdriver.common.by import By
          from selenium.webdriver.support.ui import WebDriverWait
          from selenium.webdriver.support import expected_conditions as EC
          from selenium.webdriver.chrome.service import Service
          from selenium.webdriver.chrome.options import Options

          BASE_URL = "https://dayyamvishnu.github.io/Resume-pdd"
          results = []
          start_time = datetime.now()

          def log(category, action, status, details="", duration=0):
              results.append({
                  "timestamp": datetime.now().isoformat(),
                  "category": category,
                  "action": action,
                  "status": status,
                  "details": details,
                  "duration_ms": round(duration),
              })
              icon = "✅" if status == "PASS" else "❌"
              print(f"  {icon} [{status}] {category} > {action}: {details}")

          # ── Driver setup ──────────────────────────────────────────────────────
          opts = Options()
          opts.add_argument("--headless=new")
          opts.add_argument("--no-sandbox")
          opts.add_argument("--disable-dev-shm-usage")
          opts.add_argument("--window-size=1920,1080")
          opts.add_argument("--disable-gpu")
          driver = webdriver.Chrome(service=Service("/usr/local/bin/chromedriver"), options=opts)
          wait = WebDriverWait(driver, 15)

          print("\n" + "="*60)
          print("  SELENIUM E2E TEST SUITE — ATS Resume Analyzer")
          print("  Target: " + BASE_URL)
          print("="*60 + "\n")

          # ── TEST 1: Page Load ─────────────────────────────────────────────────
          t0 = time.time()
          try:
              driver.get(BASE_URL + "/#/login")
              wait.until(EC.presence_of_element_located((By.TAG_NAME, "body")))
              title = driver.title
              dur = (time.time() - t0) * 1000
              log("Page Load", "Initial Load", "PASS", f"Title: '{title}' | {dur:.0f}ms", dur)
          except Exception as e:
              log("Page Load", "Initial Load", "FAIL", str(e))

          # ── TEST 2: Login Page Elements Present ───────────────────────────────
          t0 = time.time()
          try:
              email_el = wait.until(EC.presence_of_element_located((By.ID, "email")))
              pw_el    = driver.find_element(By.ID, "password")
              btn_el   = driver.find_element(By.ID, "login-button")
              dur = (time.time() - t0) * 1000
              log("UI Elements", "Login Form Fields", "PASS",
                  "email, password, login-button IDs found", dur)
          except Exception as e:
              log("UI Elements", "Login Form Fields", "FAIL", str(e))

          # ── TEST 3: Email Field Accepts Input ─────────────────────────────────
          t0 = time.time()
          try:
              email_el = driver.find_element(By.ID, "email")
              email_el.clear()
              email_el.send_keys("test@example.com")
              val = email_el.get_attribute("value")
              dur = (time.time() - t0) * 1000
              assert val == "test@example.com", f"Got: {val}"
              log("Input Validation", "Email Field Input", "PASS", f"Value set: {val}", dur)
          except Exception as e:
              log("Input Validation", "Email Field Input", "FAIL", str(e))

          # ── TEST 4: Password Field Accepts Input ──────────────────────────────
          t0 = time.time()
          try:
              pw_el = driver.find_element(By.ID, "password")
              pw_el.clear()
              pw_el.send_keys("TestPass123!")
              val = pw_el.get_attribute("value")
              dur = (time.time() - t0) * 1000
              assert len(val) > 0, "Password empty"
              log("Input Validation", "Password Field Input", "PASS", "Password accepted (masked)", dur)
          except Exception as e:
              log("Input Validation", "Password Field Input", "FAIL", str(e))

          # ── TEST 5: Login Button is Clickable ─────────────────────────────────
          t0 = time.time()
          try:
              btn = wait.until(EC.element_to_be_clickable((By.ID, "login-button")))
              dur = (time.time() - t0) * 1000
              log("Button State", "Login Button Clickable", "PASS", "Button enabled and clickable", dur)
          except Exception as e:
              log("Button State", "Login Button Clickable", "FAIL", str(e))

          # ── TEST 6: Login Attempt → Error Message for Wrong Creds ─────────────
          t0 = time.time()
          try:
              driver.find_element(By.ID, "email").clear()
              driver.find_element(By.ID, "email").send_keys("wrong@test.com")
              driver.find_element(By.ID, "password").clear()
              driver.find_element(By.ID, "password").send_keys("WrongPass")
              driver.find_element(By.ID, "login-button").click()
              time.sleep(3)
              page_source = driver.page_source
              # Should stay on login or show error (not dashboard)
              still_on_login = "login" in driver.current_url.lower() or "login" in page_source.lower()
              dur = (time.time() - t0) * 1000
              if still_on_login:
                  log("Auth Security", "Invalid Login Rejection", "PASS",
                      "Invalid credentials correctly rejected", dur)
              else:
                  log("Auth Security", "Invalid Login Rejection", "FAIL",
                      f"URL changed to: {driver.current_url}", dur)
          except Exception as e:
              log("Auth Security", "Invalid Login Rejection", "FAIL", str(e))

          # ── TEST 7: Forgot Password Link ──────────────────────────────────────
          t0 = time.time()
          try:
              driver.get(BASE_URL + "/#/login")
              forgot = wait.until(EC.presence_of_element_located(
                  (By.XPATH, "//*[contains(text(),'Forgot') or contains(text(),'forgot')]")))
              dur = (time.time() - t0) * 1000
              log("Navigation", "Forgot Password Link Present", "PASS",
                  f"Link text: '{forgot.text}'", dur)
          except Exception as e:
              log("Navigation", "Forgot Password Link Present", "FAIL", str(e))

          # ── TEST 8: Sign Up Link ──────────────────────────────────────────────
          t0 = time.time()
          try:
              signup = wait.until(EC.presence_of_element_located(
                  (By.XPATH, "//*[contains(text(),'Sign up') or contains(text(),'signup') or contains(text(),'Register')]")))
              dur = (time.time() - t0) * 1000
              log("Navigation", "Sign Up Link Present", "PASS",
                  f"Link text: '{signup.text}'", dur)
          except Exception as e:
              log("Navigation", "Sign Up Link Present", "FAIL", str(e))

          # ── TEST 9: Page is Responsive (mobile viewport) ──────────────────────
          t0 = time.time()
          try:
              driver.set_window_size(375, 812)   # iPhone 13 dimensions
              time.sleep(1)
              body = driver.find_element(By.TAG_NAME, "body")
              dur = (time.time() - t0) * 1000
              log("Responsive Design", "Mobile Viewport Render", "PASS",
                  "App renders without JS errors at 375px width", dur)
              driver.set_window_size(1920, 1080)
          except Exception as e:
              log("Responsive Design", "Mobile Viewport Render", "FAIL", str(e))

          # ── TEST 10: HTTPS / Secure Connection ───────────────────────────────
          t0 = time.time()
          try:
              url = driver.current_url
              assert url.startswith("https://"), f"Not HTTPS: {url}"
              dur = (time.time() - t0) * 1000
              log("Security", "HTTPS Enforced", "PASS", f"URL: {url}", dur)
          except Exception as e:
              log("Security", "HTTPS Enforced", "FAIL", str(e))

          driver.quit()

          # ── Summary ───────────────────────────────────────────────────────────
          passed = sum(1 for r in results if r["status"] == "PASS")
          failed = sum(1 for r in results if r["status"] == "FAIL")
          total  = len(results)
          duration = (datetime.now() - start_time).total_seconds()

          print("\n" + "="*60)
          print(f"  RESULTS: {passed}/{total} PASSED  |  {failed} FAILED  |  {duration:.1f}s")
          print("="*60 + "\n")

          with open("selenium_results.json", "w") as f:
              json.dump({
                  "summary": {"total": total, "passed": passed, "failed": failed,
                               "duration_seconds": round(duration, 1),
                               "timestamp": start_time.isoformat()},
                  "results": results
              }, f, indent=2)

          sys.exit(0 if failed == 0 else 1)
          PYTHON_EOF

      # ── 7. Run Selenium Tests ─────────────────────────────────────────────────
      - name: Run Selenium E2E Tests
        run: python run_selenium_tests.py
        continue-on-error: true          # Still generate report even if tests fail

      # ── 8. Generate HTML Report ───────────────────────────────────────────────
      - name: Generate HTML Test Report
        if: always()
        run: |
          python << 'PYTHON_EOF'
          import json, os
          from datetime import datetime

          with open("selenium_results.json") as f:
              data = json.load(f)

          summary = data["summary"]
          results = data["results"]
          passed  = summary["passed"]
          failed  = summary["failed"]
          total   = summary["total"]
          rate    = round((passed/total)*100) if total else 0
          color   = "#22c55e" if failed == 0 else "#ef4444"

          rows = ""
          for r in results:
              icon  = "✅" if r["status"] == "PASS" else "❌"
              badge = ("pass-badge" if r["status"] == "PASS" else "fail-badge")
              rows += f"""
              <tr>
                <td>{icon}</td>
                <td>{r['category']}</td>
                <td>{r['action']}</td>
                <td><span class="{badge}">{r['status']}</span></td>
                <td>{r['details']}</td>
                <td>{r['duration_ms']} ms</td>
              </tr>"""

          html = f"""<!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8"/>
            <meta name="viewport" content="width=device-width,initial-scale=1"/>
            <title>Selenium E2E Test Report — ATS Resume Analyzer</title>
            <style>
              *{{box-sizing:border-box;margin:0;padding:0}}
              body{{font-family:'Segoe UI',Arial,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh}}
              header{{background:linear-gradient(135deg,#6366f1,#8b5cf6);padding:2rem;text-align:center}}
              header h1{{font-size:1.8rem;font-weight:700;color:#fff}}
              header p{{color:#c7d2fe;margin-top:.5rem}}
              .cards{{display:flex;gap:1rem;padding:1.5rem;flex-wrap:wrap;justify-content:center}}
              .card{{background:#1e293b;border-radius:12px;padding:1.5rem 2rem;text-align:center;flex:1;min-width:150px;border:1px solid #334155}}
              .card .num{{font-size:2.5rem;font-weight:800}}
              .card .lbl{{color:#94a3b8;font-size:.85rem;margin-top:.3rem}}
              .total .num{{color:#818cf8}}
              .pass-c .num{{color:#22c55e}}
              .fail-c .num{{color:#ef4444}}
              .rate-c .num{{color:{color}}}
              table{{width:96%;margin:0 auto 2rem;border-collapse:collapse;background:#1e293b;border-radius:12px;overflow:hidden;border:1px solid #334155}}
              th{{background:#334155;padding:.75rem 1rem;text-align:left;font-size:.8rem;text-transform:uppercase;letter-spacing:.05em;color:#94a3b8}}
              td{{padding:.8rem 1rem;border-bottom:1px solid #1e293b;font-size:.9rem;vertical-align:middle}}
              tr:hover td{{background:#263348}}
              .pass-badge{{background:#14532d;color:#86efac;padding:.2rem .7rem;border-radius:999px;font-size:.8rem;font-weight:600}}
              .fail-badge{{background:#7f1d1d;color:#fca5a5;padding:.2rem .7rem;border-radius:999px;font-size:.8rem;font-weight:600}}
              footer{{text-align:center;padding:1rem;color:#475569;font-size:.8rem}}
            </style>
          </head>
          <body>
            <header>
              <h1>🤖 Selenium E2E Test Report</h1>
              <p>ATS Resume Analyzer &nbsp;|&nbsp; {summary['timestamp'][:19].replace('T',' ')} &nbsp;|&nbsp; {summary['duration_seconds']}s</p>
            </header>
            <div class="cards">
              <div class="card total"><div class="num">{total}</div><div class="lbl">Total Tests</div></div>
              <div class="card pass-c"><div class="num">{passed}</div><div class="lbl">Passed</div></div>
              <div class="card fail-c"><div class="num">{failed}</div><div class="lbl">Failed</div></div>
              <div class="card rate-c"><div class="num">{rate}%</div><div class="lbl">Pass Rate</div></div>
            </div>
            <table>
              <thead><tr><th></th><th>Category</th><th>Test Action</th><th>Status</th><th>Details</th><th>Duration</th></tr></thead>
              <tbody>{rows}</tbody>
            </table>
            <footer>Generated by GitHub Actions CI/CD Pipeline &nbsp;·&nbsp; github.com/DAYYAMVISHNU/Resume-pdd</footer>
          </body>
          </html>"""

          os.makedirs("test-report", exist_ok=True)
          with open("test-report/index.html", "w") as f:
              f.write(html)
          print("✅ HTML report written to test-report/index.html")
          PYTHON_EOF

      # ── 9. Upload HTML Report as Artifact ─────────────────────────────────────
      - name: Upload HTML Test Report Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: selenium-test-report
          path: test-report/
          retention-days: 30

      # ── 10. Upload raw JSON results ────────────────────────────────────────────
      - name: Upload Raw JSON Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: selenium-raw-results
          path: selenium_results.json
          retention-days: 30

      # ── 11. Print summary in logs ──────────────────────────────────────────────
      - name: Print Test Summary
        if: always()
        run: |
          echo ""
          echo "============================================"
          echo "  📊 SELENIUM E2E TEST RESULTS SUMMARY"
          echo "============================================"
          python -c "
          import json
          with open('selenium_results.json') as f:
              d = json.load(f)
          s = d['summary']
          print(f\"  Total : {s['total']}\")
          print(f\"  Passed: {s['passed']}\")
          print(f\"  Failed: {s['failed']}\")
          print(f\"  Rate  : {round(s['passed']/s['total']*100 if s['total'] else 0)}%\")
          print(f\"  Time  : {s['duration_seconds']}s\")
          "
          echo "============================================"
          echo ""
